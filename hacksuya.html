<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hacksuya — Animes RD</title>
  <link rel="stylesheet" href="css/style.css?v=nav-logo-link-1" />
  <script type="module" src="./js/theme.js?v=dark-default-1"></script>
</head>
<body>

<nav class="nav">
  <a class="nav-logo" href="index.html">Animes RD</a>
  <a href="index.html">Blog</a>
  <a href="acervo.html">Acervo</a>
  <a href="charts.html">Gráficos</a>
  <a href="compare.html">Comparar</a>
  <a href="suggest.html">Sugerir Anime</a>
  <a href="pending.html">Fila de Aprovação</a>
  <button class="theme-toggle" type="button" data-theme-toggle aria-label="Ativar modo noturno" title="Modo noturno">☾</button>
  <div class="nav-person">
    <a href="rafael.html"><span class="nav-avatar" style="background:rgba(124,58,237,0.18);color:#6f45d8">R</span>Rafael</a>
    <a href="fernando.html"><span class="nav-avatar" style="background:rgba(236,72,153,0.18);color:#d83182">F</span>Fernando</a>
    <a href="dudu.html"><span class="nav-avatar" style="background:rgba(234,179,8,0.18);color:#b7791f">D</span>Dudu</a>
    <a href="hacksuya.html" class="active"><span class="nav-avatar" style="background:rgba(6,182,212,0.18);color:#0588a6">H</span>Hacksuya</a>
  </div>
</nav>

<main class="page">
  <div class="person-hero">
    <div class="person-avatar-big" style="background:rgba(6,182,212,0.25);color:#67e8f9;border:2px solid #06b6d4">H</div>
    <div>
      <h1 style="color:#67e8f9">Hacksuya</h1>
      <p id="person-subtitle">Carregando...</p>
    </div>
  </div>

  <div class="stats-grid" id="person-stats"></div>

  <div class="grid-2" style="margin-bottom:28px">
    <div class="card">
      <div class="card-title">Distribuição de gêneros</div>
      <div class="chart-container" style="height:260px">
        <canvas id="chartPie"></canvas>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Top 10 notas</div>
      <div class="chart-container" style="height:260px">
        <canvas id="chartNotas"></canvas>
      </div>
    </div>
  </div>

  <div class="grid-2">
    <div class="card">
      <div class="card-title">Animes exclusivos 🔒</div>
      <p style="font-size:12px;color:var(--faint);margin-bottom:12px">Só Hacksuya assistiu</p>
      <ul class="anime-list" id="list-exclusive"></ul>
    </div>
    <div class="card">
      <div class="card-title">Ainda não assistiu 👀</div>
      <p style="font-size:12px;color:var(--faint);margin-bottom:12px">Os outros já viram</p>
      <ul class="anime-list" id="list-missed"></ul>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script type="module">
  import {
    loadData, animesOf, favoriteGenre, avgNota,
    favoriteAnime, mostControversial, exclusiveAnimes,
    missedAnimes, countGenres, cleanGenreLabel
  } from "./js/data.js?v=dudu-yellow-1";

  const PERSON = "Hacksuya";
  const COLOR = "#06b6d4";
  const LIGHT = "#67e8f9";
  function pNota(a) { return a.notaHacksuya; }

  const { animes } = await loadData();
  const mine = animesOf(animes, PERSON);

  document.getElementById("person-subtitle").textContent = `${mine.length} animes assistidos`;

  const avg = avgNota(animes, PERSON);
  const fav = favoriteAnime(animes, PERSON);
  const contr = mostControversial(animes, PERSON);
  const genre = favoriteGenre(animes, PERSON);

  document.getElementById("person-stats").innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Animes assistidos</div>
      <div class="stat-value" style="color:${LIGHT}">${mine.length}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Gênero favorito</div>
      <div class="stat-value" style="font-size:16px;color:${LIGHT}">${genre}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Média de notas</div>
      <div class="stat-value" style="color:#34d399">${avg ? avg.toFixed(2) : "—"}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Anime favorito ⭐</div>
      <div class="stat-value" style="font-size:15px;color:${LIGHT}" title="${fav?.nome}">${fav ? fav.nome.slice(0,18) : "—"}</div>
      <div class="stat-sub">${fav ? pNota(fav)?.toFixed(1) : ""}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Mais controverso 🌶️</div>
      <div class="stat-value" style="font-size:15px;color:#ef4444" title="${contr?.nome}">${contr ? contr.nome.slice(0,18) : "—"}</div>
      <div class="stat-sub">${contr ? "diff " + contr.controversia.toFixed(1) : ""}</div>
    </div>
  `;

  function hexAlpha(hex, a) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${a})`;
  }

  const map = countGenres(mine);
  const entries = Object.entries(map).sort((a,b) => b[1]-a[1]).slice(0,8);
  new Chart(document.getElementById("chartPie"), {
    type: "doughnut",
    data: {
      labels: entries.map(([g]) => cleanGenreLabel(g)),
      datasets: [{
        data: entries.map(([,c]) => c),
        backgroundColor: entries.map((_,i) => hexAlpha(COLOR, Math.max(0.25, 1-i*0.1))),
        borderColor: "#1a1a2e", borderWidth: 2, hoverOffset: 6,
      }],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: "right", labels: { boxWidth: 10, padding: 10, font: { size: 11 } } } },
      animation: { duration: 800 },
    },
  });

  const top10 = mine.filter(a => pNota(a) !== null).sort((a,b) => pNota(b)-pNota(a)).slice(0,10);
  new Chart(document.getElementById("chartNotas"), {
    type: "bar",
    data: {
      labels: top10.length ? top10.map(a => a.nome.length > 20 ? a.nome.slice(0,18)+"…" : a.nome) : ["Nenhum dado"],
      datasets: [{
        data: top10.map(a => pNota(a)),
        backgroundColor: hexAlpha(COLOR, 0.75),
        borderColor: COLOR, borderWidth: 1, borderRadius: 6,
      }],
    },
    options: {
      indexAxis: "y", responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: "rgba(255,255,255,0.06)" }, min: 5, max: 10 },
        y: { grid: { display: false } },
      },
      animation: { duration: 800, easing: "easeOutQuart" },
    },
  });

  const excl = exclusiveAnimes(animes, PERSON);
  document.getElementById("list-exclusive").innerHTML = excl.length
    ? excl.map(a => `<li><span class="name">${a.nome}</span><span class="score">${pNota(a) !== null ? pNota(a).toFixed(1) : ""}</span></li>`).join("")
    : `<li style="color:var(--faint)">Nenhum exclusivo</li>`;

  const missed = missedAnimes(animes, PERSON);
  document.getElementById("list-missed").innerHTML = missed.length
    ? missed.slice(0,20).map(a => `<li><span class="name">${a.nome}</span><span class="empty-score">${a.quemAssistiu.join(", ")}</span></li>`).join("")
    : `<li style="color:var(--faint)">Assistiu tudo! 🎉</li>`;
</script>
</body>
</html>
