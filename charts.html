<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gráficos — Animes RD</title>
    <link rel="stylesheet" href="css/style.css?v=table-border-2" />
    <script type="module" src="./js/theme.js?v=ciel-gold-3"></script>
    <script type="module" src="./js/utils.js?v=ciel-gold-3"></script>
    <style>
      .page-header h1 {
        background: linear-gradient(90deg, #c4b5fd, #f9a8d4);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.1;
      }
    </style>
  </head>
  <body>
    <nav class="nav"></nav>

    <main class="page">
      <div class="page-header">
        <h1>Gráficos Gerais</h1>
        <p>Visão geral de todos os dados — Rafael, Fernando, Dudu, Hacksuya e Zana</p>
      </div>

      <div class="grid-2">
        <div class="card">
          <div class="card-title">Top gêneros assistidos</div>
          <div class="chart-container" style="height: 320px">
            <canvas id="chartTopGenres"></canvas>
          </div>
        </div>
        <div class="card">
          <div class="card-title">Proporção por qtd. de espectadores</div>
          <div class="chart-container" style="height: 320px">
            <canvas id="chartVotesPie"></canvas>
          </div>
        </div>
      </div>

      <div class="card" style="margin-bottom: 28px">
        <div class="card-title">Gêneros por pessoa (top 8)</div>
        <div class="chart-container" style="height: 300px">
          <canvas id="chartGenreByPerson"></canvas>
        </div>
      </div>

      <div class="card" style="margin-bottom: 28px">
        <div class="card-title">Top 10 melhores notas gerais</div>
        <div class="chart-container" style="height: 320px">
          <canvas id="chartVotesRanking"></canvas>
        </div>
      </div>

      <div class="card" style="margin-bottom: 28px">
        <div class="card-title">Nota média — Controvérsia (hover para ver o nome)</div>
        <div class="chart-container" style="height: 340px">
          <canvas id="chartScatter"></canvas>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script type="module">
      import { loadData } from "./js/data.js?v=ciel-gold-3";
      import { renderAllCharts } from "./js/charts.js?v=ciel-gold-3";

      const { animes } = await loadData();
      renderAllCharts(animes);
    </script>
    <script type="module" src="js/nyx-widget.js?v=ciel-widget-1"></script>
  </body>
</html>
