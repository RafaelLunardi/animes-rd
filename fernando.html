<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fernando — Animes RD</title>
    <link rel="stylesheet" href="css/style.css?v=table-border-4" />
    <script type="module" src="./js/theme.js?v=ciel-gold-3"></script>
    <script type="module" src="./js/utils.js?v=ciel-gold-3"></script>
  </head>
  <body class="person-profile-page fernando-page">
    <nav class="nav"></nav>

    <main class="page">
      <div class="person-hero">
        <div>
          <h1 style="color: #f9a8d4">Fernando</h1>
          <p id="person-subtitle">Carregando...</p>
        </div>
      </div>

      <div class="stats-grid" id="person-stats"></div>

      <div class="grid-2" style="margin-bottom: 28px">
        <div class="card">
          <div class="card-title">Distribuição de gêneros</div>
          <div class="chart-container" style="height: 260px">
            <canvas id="chartPie"></canvas>
          </div>
        </div>
        <div class="card">
          <div class="card-title">Top 10 notas</div>
          <div class="chart-container" style="height: 260px">
            <canvas id="chartNotas"></canvas>
          </div>
        </div>
      </div>

      <div class="grid-2">
        <div class="card">
          <div class="card-title">Animes exclusivos</div>
          <p style="font-size: 12px; color: var(--faint); margin-bottom: 12px">
            Só Fernando assistiu
          </p>
          <ul class="anime-list" id="list-exclusive"></ul>
        </div>
        <div class="card">
          <div class="card-title">Ainda não assistiu</div>
          <p style="font-size: 12px; color: var(--faint); margin-bottom: 12px">
            Os outros já viram
          </p>
          <ul class="anime-list" id="list-missed"></ul>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script type="module">
      import {
        loadData,
        animesOf,
        favoriteGenre,
        avgNota,
        favoriteAnime,
        mostControversial,
        exclusiveAnimes,
        missedAnimes,
        countGenres,
        cleanGenreLabel,
      } from "./js/data.js?v=ciel-gold-3";

      const PERSON = "Fernando";
      const COLOR = "#ec4899";
      const LIGHT = "#f9a8d4";
      const GENRE_PALETTE = [
        "#f9a8d4",
        "#c4b5fd",
        "#67e8f9",
        "#86efac",
        "#fde68a",
        "#fb7185",
        "#d8b4fe",
        "#5eead4",
      ];
      const BAR_PALETTE = [
        "#f9a8d4",
        "#f5a7d9",
        "#efa6de",
        "#e8a6e2",
        "#dfa7e6",
        "#d6a8e9",
        "#cda9eb",
        "#c4aaed",
        "#bbabed",
        "#b4acec",
      ];
      function pNota(a) {
        return a.notaFernando;
      }

      const { animes } = await loadData();
      const mine = animesOf(animes, PERSON);

      document.getElementById("person-subtitle").textContent = `${mine.length} animes assistidos`;

      const avg = avgNota(animes, PERSON);
      const fav = favoriteAnime(animes, PERSON);
      const contr = mostControversial(animes, PERSON);
      const genre = favoriteGenre(animes, PERSON);

      document.getElementById("person-stats").innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Animes assistidos</div>
      <div class="stat-value stat-value-number">${mine.length}</div>
      <div class="stat-sub" aria-hidden="true">&nbsp;</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Gênero favorito</div>
      <div class="stat-value stat-value-text">${genre}</div>
      <div class="stat-sub" aria-hidden="true">&nbsp;</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Média de notas</div>
      <div class="stat-value stat-value-number">${avg ? avg.toFixed(2) : "—"}</div>
      <div class="stat-sub" aria-hidden="true">&nbsp;</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Anime favorito</div>
      <div class="stat-value stat-value-text" title="${fav?.nome}">${fav ? fav.nome : "—"}</div>
      <div class="stat-sub">${fav ? pNota(fav)?.toFixed(1) : ""}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Mais controverso</div>
      <div class="stat-value stat-value-text" title="${contr?.nome}">${contr ? contr.nome : "—"}</div>
      <div class="stat-sub">${contr ? "diff " + contr.controversia.toFixed(1) : ""}</div>
    </div>
  `;

      function hexAlpha(hex, a) {
        const r = parseInt(hex.slice(1, 3), 16),
          g = parseInt(hex.slice(3, 5), 16),
          b = parseInt(hex.slice(5, 7), 16);
        return `rgba(${r},${g},${b},${a})`;
      }

      const map = countGenres(mine);
      const entries = Object.entries(map)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 8);
      new Chart(document.getElementById("chartPie"), {
        type: "doughnut",
        data: {
          labels: entries.map(([g]) => cleanGenreLabel(g)),
          datasets: [
            {
              data: entries.map(([, c]) => c),
              backgroundColor: entries.map((_, i) => GENRE_PALETTE[i % GENRE_PALETTE.length]),
              borderColor: "rgba(10,10,15,0.92)",
              borderWidth: 4,
              hoverOffset: 8,
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          cutout: "58%",
          plugins: {
            legend: {
              position: "right",
              labels: {
                boxWidth: 10,
                boxHeight: 10,
                color: "#ded7c8",
                padding: 13,
                usePointStyle: true,
                pointStyle: "circle",
                font: { size: 12, weight: "700" },
              },
            },
          },
          animation: { duration: 800 },
        },
      });

      const top10 = mine
        .filter((a) => pNota(a) !== null)
        .sort((a, b) => pNota(b) - pNota(a))
        .slice(0, 10);
      new Chart(document.getElementById("chartNotas"), {
        type: "bar",
        data: {
          labels: top10.map((a) => (a.nome.length > 20 ? a.nome.slice(0, 18) + "—" : a.nome)),
          datasets: [
            {
              data: top10.map((a) => pNota(a)),
              backgroundColor: top10.length
                ? top10.map((_, i) => BAR_PALETTE[i % BAR_PALETTE.length])
                : [BAR_PALETTE[0]],
              borderColor: top10.length
                ? top10.map((_, i) => BAR_PALETTE[i % BAR_PALETTE.length])
                : [BAR_PALETTE[0]],
              borderWidth: 1,
              borderRadius: 999,
              barThickness: 14,
            },
          ],
        },
        options: {
          indexAxis: "y",
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: {
              grid: { color: "rgba(255,255,255,0.06)" },
              min: 5,
              max: 10,
              ticks: { color: "#b8ae9d", font: { weight: "700" } },
            },
            y: {
              grid: { display: false },
              ticks: { color: "#ded7c8", font: { weight: "800" } },
            },
          },
          animation: { duration: 800, easing: "easeOutQuart" },
        },
      });

      const excl = exclusiveAnimes(animes, PERSON);
      document.getElementById("list-exclusive").innerHTML = excl.length
        ? excl
            .map(
              (a) =>
                `<li><span class="name">${a.nome}</span><span class="score">${pNota(a) !== null ? pNota(a).toFixed(1) : ""}</span></li>`,
            )
            .join("")
        : `<li style="color:var(--faint)">Nenhum exclusivo</li>`;

      const missed = missedAnimes(animes, PERSON);
      document.getElementById("list-missed").innerHTML = missed.length
        ? missed
            .slice(0, 20)
            .map(
              (a) =>
                `<li><span class="name">${a.nome}</span><span class="empty-score">${a.quemAssistiu.join(", ")}</span></li>`,
            )
            .join("")
        : `<li style="color:var(--faint)">Assistiu tudo!</li>`;
    </script>
    <script type="module" src="js/nyx-widget.js?v=ciel-widget-1"></script>
  </body>
</html>
