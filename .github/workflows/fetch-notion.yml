name: Fetch Notion Data

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: fetch-notion
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          cd scripts
          npm install

      - name: Fetch Notion data
        id: fetch_notion
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          if [ -z "$NOTION_API_KEY" ] || [ -z "$NOTION_DATABASE_ID" ]; then
            echo "Notion secrets not configured; keeping the current data/animes.json."
            echo "updated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          node scripts/fetch-notion.js
          echo "updated=true" >> "$GITHUB_OUTPUT"

      - name: Commit updated data
        if: steps.fetch_notion.outputs.updated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/animes.json
          git diff --cached --quiet || git commit -m "chore: update animes data [skip ci]"
          git push
